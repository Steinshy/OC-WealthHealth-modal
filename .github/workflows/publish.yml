name: Publish to npm

on:
  release:
    types: [created]

permissions:
  contents: read

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure release commit is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "This release points to a commit that is not on main. Publishing is skipped (exit 1)."
            exit 1
          fi
          echo "Release commit $(git rev-parse --short HEAD) is on main — OK to publish."

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Run safety gate (type-check + build)
        run: npm run prepublishOnly

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
